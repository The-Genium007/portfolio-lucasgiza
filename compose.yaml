services:
  nextjs:
    image: nextjs-app:latest
    container_name: nextjs-app  # ← Nom fixe

    build:
      context: .
      dockerfile: Dockerfile
    
    environment:
      NODE_ENV: production
      PORT: 3000
    
    networks:
      - dokploy-network
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager
    
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  # Proxy OAuth pour Decap CMS — micro-service qui gère l'authentification GitHub
  # Cloudflare Tunnel : auth.lucasgiza.com → http://decap-oauth:3000
  decap-oauth:
    container_name: decap-oauth  # ← Nom fixe, utilisé comme hostname dans Cloudflare Tunnel

    build:
      context: ./oauth
      dockerfile: Dockerfile

    environment:
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}

    networks:
      - dokploy-network

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s

    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'

networks:
  dokploy-network:
    external: true